<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Landing - Cryptic Message</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- الشاشة السوداء والنظام -->
    <div class="terminal-container" id="terminal">
        <div class="terminal-header">Heart Landing</div>
        <div class="terminal-body">
            <p class="line">[system] Initializing heart.PROTOCOL_v2.0...</p>
            <p class="line">[status] <span class="loading-dots">...</span></p>
            <p class="line">• One encrypted package found for you.</p>
            <button class="decrypt-btn" id="decryptBtn">🔓 DECRYPT MESSAGE</button>
            <p class="hint">(or just click anywhere)</p>
        </div>
    </div>

    <!-- الحاوية اللي يظهر فيها القلب والكلمات -->
    <div class="heart-canvas hidden" id="heartCanvas"></div>

    <script src="script.js"></script>
</body>
</html>
